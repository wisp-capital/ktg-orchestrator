# ktg-orchestrator wrapped repos — the single source of truth for KTG-related work.
#
# Orchestration-only: source lives in each repo's own checkout listed below.
# This repo vendors NO source. The tool assembles each wrapped repo into
# ./workspace/<name> as an isolated git worktree branched from origin/main,
# and ships changes back as a PR targeting main.

branch_prefix = "stark/"

[[repo]]
name = "kotquant"
path = "~/repos/kotquant"
remote = "git@github.com:wisp-capital/kotquant.git"
trunk = "main"
lang = "kotlin"
status = "active"
role = "KTG signal generation and upstream trading behavior"
edit_policy = "source"
default_assemble = true
read_first = ["AGENTS.md", "README.md"]
verify = ["./gradlew test --no-daemon"]
routes = ["signal generation", "KTG strategy", "trading behavior", "kotquant"]

[[repo]]
name = "kore-proxy"
path = "~/repos/kore-proxy"
remote = "git@github.com:wisp-capital/kore-proxy.git"
trunk = "main"
lang = "rust"
status = "active"
role = "Kore return path and proxy for execution events"
edit_policy = "source"
default_assemble = true
read_first = ["AGENTS.md", "README.md"]
verify = ["cargo test --workspace"]
routes = ["Kore proxy", "execution events", "return path"]

[[repo]]
name = "korpse"
path = "~/repos/korpse"
remote = "git@github.com:wisp-capital/korpse.git"
trunk = "main"
lang = "cpp"
status = "active"
role = "Kore strategy executor and trade-plan state machine"
edit_policy = "source"
default_assemble = true
read_first = ["AGENTS.md", "README.md", "docs/signal-flow.md"]
verify = ["cmake --build build"]
routes = ["order routing", "trade-plan state machine", "missing order", "korpse"]
