# ktg-orchestrator wrapped repos — the single source of truth for KTG-related work.
#
# Orchestration-only: source lives in each repo's own checkout listed below.
# This repo vendors NO source. The tool assembles each wrapped repo into
# ./workspace/<name> as an isolated git worktree branched from origin/main,
# and ships changes back as a PR targeting main.

branch_prefix = "stark/"

framework_version = "v7.1"
worktree_root = "workspace/"

# Known overlaps where a task could plausibly belong to either repo. `just route`
# surfaces the matching rule when its top two candidates are exactly this pair.

[[disambiguation]]
ambiguity = "kotquant vs korpse"
prefer = "kotquant"
over = "korpse"
rule = "KTG signal generation / strategy logic -> kotquant; order routing / trade-plan state machine / executor -> korpse"

[[disambiguation]]
ambiguity = "kore-proxy vs korpse"
prefer = "kore-proxy"
over = "korpse"
rule = "Kore return path / proxy for execution events -> kore-proxy; strategy executor / trade-plan state machine -> korpse"


[[repo]]
name = "kotquant"
path = "~/repos/kotquant"
remote = "git@github.com:wisp-capital/kotquant.git"
trunk = "main"
lang = "kotlin"
status = "active"
role = "KTG signal generation and upstream trading behavior"
edit_policy = "source"
default_assemble = true
read_first = ["AGENTS.md", "README.md"]
verify = ["./gradlew test --no-daemon"]
routes = ["signal generation", "KTG strategy", "trading behavior", "kotquant"]
examples = ["generate a KTG signal", "change the KTG strategy logic", "fix kotquant trading behavior"]

[[repo]]
name = "kore-proxy"
path = "~/repos/kore-proxy"
remote = "git@github.com:wisp-capital/kore-proxy.git"
trunk = "main"
lang = "rust"
status = "active"
role = "Kore return path and proxy for execution events"
edit_policy = "source"
default_assemble = true
read_first = ["AGENTS.md", "README.md"]
verify = ["cargo test --workspace"]
routes = ["Kore proxy", "execution events", "return path"]
examples = ["fix the Kore return path", "proxy an execution event"]

[[repo]]
name = "korpse"
path = "~/repos/korpse"
remote = "git@github.com:wisp-capital/korpse.git"
trunk = "main"
lang = "cpp"
status = "active"
role = "Kore strategy executor and trade-plan state machine"
edit_policy = "source"
default_assemble = true
read_first = ["AGENTS.md", "README.md", "docs/signal-flow.md"]
verify = ["cmake --build build"]
routes = ["order routing", "trade-plan state machine", "missing order", "korpse"]
examples = ["fix the trade-plan state machine", "route an order through korpse", "handle a missing order"]
