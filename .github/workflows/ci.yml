name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  orchestrator:
    runs-on: ubuntu-latest
    env:
      AI_MAX_READ_TOKEN: ${{ secrets.AI_MAX_READ_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Checkout ai-max
        if: env.AI_MAX_READ_TOKEN != ''
        uses: actions/checkout@v4
        with:
          repository: wisp-capital/ai-max
          path: ai-max
          token: ${{ secrets.AI_MAX_READ_TOKEN }}
      - name: Orchestrator compliance
        if: env.AI_MAX_READ_TOKEN != ''
        run: python3 ai-max/scripts/amx.py --root . orchestrator-check
      - name: AI Max token not configured
        if: env.AI_MAX_READ_TOKEN == ''
        run: echo "::notice::Set AI_MAX_READ_TOKEN to enforce orchestrator compliance in CI."
